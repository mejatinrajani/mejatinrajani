name: 🐍 Contribution Snake

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day — keeps the animation fresh!
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Force regenerate snake animation"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write

jobs:
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🐍 Generate contribution snake (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: mejatinrajani
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 🚀 Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          commit_message: "chore(snake): 🐍 refresh contribution snake animation [skip ci]"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: |
            chore(snake): 🐍 refresh contribution snake animation

            Auto-generated by the Contribution Snake workflow.
            Triggered by: ${{ github.event_name }}
            Run ID: ${{ github.run_id }}